name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # create release and upload artifacts
  id-token: write  # OIDC for optional signing

jobs:
  build:
    name: ubuntu-24.04-k3s
    uses: kairos-io/kairos-factory-action/.github/workflows/reusable-factory.yaml@583ec0586948b7b8e7692f6db22e902b373d48f3 # v0.0.13
    permissions:
      id-token: write
      contents: write
      actions: read
    with:
      auroraboot_version: "v0.19.1"
      kairos_version: "${{ github.ref_name }}"
      base_image: "ubuntu:24.04"
      arch: "amd64"
      model: "generic"
      version: "auto"
      no_cache: true
      iso: true
      # Omit kubernetes_version: kairos-init uses latest k3s by default
      kubernetes_distro: "k3s"
      list_release_artifacts: true
      release: true
      grype: false
      trivy: false
      cosign: false
